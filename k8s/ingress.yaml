apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forge-ingress
  namespace: forge
  labels:
    app: forge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: forge.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: forge-api
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: forge-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forge-frontend
                port:
                  number: 3000
