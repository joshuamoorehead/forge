apiVersion: v1
kind: Service
metadata:
  name: forge-api
  namespace: forge
  labels:
    app: forge
    component: api
spec:
  type: ClusterIP
  selector:
    app: forge
    component: api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: forge-frontend
  namespace: forge
  labels:
    app: forge
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: forge
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
