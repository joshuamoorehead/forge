apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-api
  namespace: forge
  labels:
    app: forge
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge
      component: api
  template:
    metadata:
      labels:
        app: forge
        component: api
    spec:
      containers:
        - name: api
          image: forge-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: forge-config
            - secretRef:
                name: forge-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-frontend
  namespace: forge
  labels:
    app: forge
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge
      component: frontend
  template:
    metadata:
      labels:
        app: forge
        component: frontend
    spec:
      containers:
        - name: frontend
          image: forge-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: forge-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
